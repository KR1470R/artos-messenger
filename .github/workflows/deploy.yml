name: Deploy Backend Application on Remote Server

on:
  workflow_dispatch:
    inputs:
      environment:
        type: environment
        description: 'Environment to deploy the application'
        required: true
      node_env:
        type: choice
        description: 'Node environment to run the application'
        default: 'development'
        options:
          - 'development'

jobs:
  deploy:
    runs-on: ubuntu-24.04
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Set up MySQL (for tests)
        run: sudo systemctl start mysql

      - name: Install backend dependencies
        run: cd backend && npm install

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend (smoke-check)
        run: cd frontend && npm run build

      - name: Create test database
        run: mysql -e 'CREATE DATABASE ${{ vars.DB_NAME_TEST }};' -uroot -proot

      - name: Run backend migrations (test DB)
        run: cd backend && NODE_ENV=test npm run migrate:up

      # - name: Run backend tests
      #   run: cd backend && npm run test:cov

      - name: Run frontend tests
        run: cd frontend && npm run test

      # ── Deploy source to server ─────────────────────────────────────────────

      - name: Back up server configs and clear old source
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.REMOTE_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            cd /var/www/artos-messenger
            mkdir -p backend-configs frontend-configs
            cp -r backend/configs/.env.* ./backend-configs/ || true
            cp -r frontend/.env.* ./frontend-configs/ || true
            rm -rf backend frontend docker assets

      - name: Copy new source to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.REMOTE_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          source: 'backend,frontend,docker,assets'
          target: '/var/www/artos-messenger'

      - name: Restore configs, install deps, build and restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.REMOTE_SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          script: |
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh

            cd /var/www/artos-messenger

            # Restore environment configs
            cp backend-configs/.env.* ./backend/configs/
            cp frontend-configs/.env.* ./frontend/

            # Install dependencies (picks up any new packages)
            cd backend && npm install --production
            cd ../frontend && npm install

            # Build frontend for production
            npm run build

            # Build backend
            cd ../backend && npm run build

            # Run any pending migrations on the live database
            NODE_ENV=${{ inputs.node_env }} npm run migrate:up

            # Restart the application with the freshly built code
            pm2 restart artos-messenger