name: artos-app

services:
  app:
    build: 
      context: ../
      dockerfile: docker/Dockerfile
      args:
        DB_HOST: db # name of db container
        NODE_ENV: development
    container_name: artos_app
    restart: always
    ports:
      - "3000:${APP_PORT}"
      - "8080:8080"
    environment:
      NODE_ENV: development
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: artos_mysql
    restart: always
    command: --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes" # for test, remove on prod
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3306:${DB_PORT}"

volumes:
  db-data: